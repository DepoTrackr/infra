_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-routes
        paths:
          - /auth
        strip_path: true

  - name: catalog-service
    url: http://catalog-service:3002
    routes:
      - name: catalog-routes
        paths:
          - /catalog
        strip_path: true

  - name: order-service
    url: http://order-service:3003
    routes:
      - name: order-routes
        paths:
          - /orders
        strip_path: true