version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: supplier-portal-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: supplier-portal-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - data-net

  kong:
    image: kong:3.7
    container_name: supplier-portal-kong
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      mock-auth:
        condition: service_started
      mock-catalog:
        condition: service_started
      mock-order:
        condition: service_started
    networks:
      - public-net
      - internal-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-auth:
    image: nginxdemos/hello:plain-text
    container_name: supplier-portal-mock-auth
    restart: unless-stopped
    networks:
      - internal-net

  mock-catalog:
    image: nginxdemos/hello:plain-text
    container_name: supplier-portal-mock-catalog
    restart: unless-stopped
    networks:
      - internal-net

  mock-order:
    image: nginxdemos/hello:plain-text
    container_name: supplier-portal-mock-order
    restart: unless-stopped
    networks:
      - internal-net

  loki:
    image: grafana/loki:3.0.0
    container_name: supplier-portal-loki
    restart: unless-stopped
    command: -config.file=/mnt/config/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./dashboard:/mnt/config:ro
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:10.4.5
    container_name: supplier-portal-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    networks:
      - observability-net
    volumes:
      - grafana_data:/var/lib/grafana

networks:
  public-net:
  internal-net:
  data-net:
  observability-net:

volumes:
  postgres_data:
  grafana_data: