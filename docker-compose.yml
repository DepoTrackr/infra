version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: depotrackr-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: depotrackr-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - data-net

  kong:
    image: kong:3.7
    container_name: depotrackr-kong
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      order-service:
        condition: service_started
    networks:
      - public-net
      - internal-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../auth-service
    container_name: depotrackr-auth-service
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-net
      - data-net

  catalog-service:
    build:
      context: ../catalog-service
    container_name: depotrackr-catalog-service
    restart: unless-stopped
    environment:
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-net
      - data-net

  order-service:
    build:
      context: ../order-service
    container_name: depotrackr-order-service
    restart: unless-stopped
    environment:
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-net
      - data-net

  loki:
    image: grafana/loki:3.0.0
    container_name: depotrackr-loki
    restart: unless-stopped
    command: -config.file=/mnt/config/loki-config.yml
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./dashboard:/mnt/config:ro
    networks:
      - observability-net

  grafana:
    image: grafana/grafana:10.4.5
    container_name: depotrackr-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - loki
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    networks:
      - observability-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboard/grafana/provisioning:/etc/grafana/provisioning:ro

  portainer:
    image: portainer/portainer-ce:latest
    container_name: depotrackr-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - public-net
  prometheus:
    image: prom/prometheus:latest
    container_name: depotrackr-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./dashboard/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal-net
      - observability-net
    depends_on:
      - auth-service
      - catalog-service
      - order-service
  promtail:
    image: grafana/promtail:3.0.0
    container_name: depotrackr-promtail
    restart: unless-stopped
    command: -config.file=/mnt/config/promtail-config.yml
    volumes:
      - ./dashboard:/mnt/config:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    networks:
      - observability-net
networks:
  public-net:
  internal-net:
  data-net:
  observability-net:

volumes:
  postgres_data:
  grafana_data:
  portainer_data:
  prometheus_data: