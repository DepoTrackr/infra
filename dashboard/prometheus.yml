global:
  scrape_interval: 15s

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:3001"]
    metrics_path: /metrics

  - job_name: catalog-service
    static_configs:
      - targets: ["catalog-service:3002"]
    metrics_path: /metrics

  - job_name: order-service
    static_configs:
      - targets: ["order-service:3003"]
    metrics_path: /metrics
